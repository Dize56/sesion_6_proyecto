name: CI Base

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11","3.10"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Linting con flake8
        run: flake8 . --max-line-length=100 --exclude=.git,__pycache__
      - name: Tests con pytest
        run: pytest tests/ -v

  entrenar:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: ["3.11","3.10"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Entrenar modelo y genera reporte
        run: python train_and_evaluate.py
      - name: Subir reporte a GitHub como artefacto
        uses: actions/upload-artifact@v3
        with:
          name: reporte-evaluacion-${{ github.run_number }}
          path: outputs/
          retention-days: 30

  evaluar:
    runs-on: ubuntu-latest
    needs: entrenar
    steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.11"
            cache: "pip"
            cache-dependency-path: requirements.txt
        - name: Install dependencies
          run: pip install -r requirements.txt
        - name: Descargar modelo y reporte de evaluación
          uses: actions/download-artifact@v3
          with:
            name: modelo-y-reporte-${{ github.run_number }}
            path: outputs/

        - name: Evaluar adicional con validación cruzada
          run: python evaluate_extra.py

        - name: Subir reporte adicional a GitHub como artefacto
          uses: actions/upload-artifact@v3
          with:
            name: reporte-evaluacion${{ github.run_number }}
            path: outputs/reporte__validacion.txt
            retention-days: 30